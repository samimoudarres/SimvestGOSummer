# Deploy on Render: https://dashboard.render.com → New → Blueprint → connect this repo.
# Set MASSIVE_API_KEY in the Render dashboard (required). SIMVEST_SERVE_DIST is set below.
services:
  - type: web
    name: simvest-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    # Persistent disk — player games, activity, accounts survive redeploys (required).
    disk:
      name: simvest-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SIMVEST_SERVE_DIST
        value: "true"
      - key: PORT
        value: "3001"
      - key: SIMVEST_DATA_DIR
        value: /var/data
      - key: MASSIVE_API_KEY
        sync: false
      - key: SIMVEST_ADMIN_SECRET
        sync: false
