# Deploy on Render: https://dashboard.render.com → New → Blueprint → connect this repo.
# Set MASSIVE_API_KEY in the Render dashboard (required). SIMVEST_SERVE_DIST is set below.
services:
  - type: web
    name: simvest-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SIMVEST_SERVE_DIST
        value: "true"
      - key: PORT
        value: "3001"
      - key: MASSIVE_API_KEY
        sync: false
